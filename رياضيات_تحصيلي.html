  {id:359, section:"m11", q:"الدالة f(x) = x³ زوجية/فردية؟", options:["زوجية", "فردية", "لا زوجية ولا فردية", "ثابتة"], correct:1, exp:"f(-x) = -x³ = -f(x). الدالة فردية متماثلة حول نقطة الأصل."},
  {id:360, section:"m11", q:"الدالة f(x) = |x| + 1 زوجية/فردية؟", options:["زوجية", "فردية", "لا هذه ولا تلك", "ثابتة"], correct:0, exp:"f(-x) = |-x| + 1 = |x| + 1 = f(x). زوجية."},
  {id:361, section:"m11", q:"الدالة f(x) = x³ + x دالة:", options:["زوجية", "فردية", "ثابتة", "متذبذبة"], correct:1, exp:"f(-x) = -x³ - x = -(x³+x) = -f(x). مجموع دالتين فرديتين = فردية."},
  {id:362, section:"m11", q:"قيمة الرأس للدالة f(x) = (x-3)² + 4:", options:["(3, 4)", "(-3, 4)", "(3, -4)", "(4, 3)"], correct:0, exp:"الصيغة القياسية a(x-h)² + k رأسها (h, k). هنا (3, 4)."},
  {id:363, section:"m11", q:"إحداثي x للرأس في f(x) = x² - 6x + 5:", options:["3", "-3", "6", "5"], correct:0, exp:"x للرأس = -b/(2a) = 6/2 = 3."},
  {id:364, section:"m11", q:"القيمة الدنيا لـ f(x) = x² - 4x + 7:", options:["3", "4", "7", "-3"], correct:0, exp:"x للرأس = 2. f(2) = 4 - 8 + 7 = 3. الدنيا = 3."},
  {id:365, section:"m11", q:"الدالة f(x) = 2x + 3 في الفترة (-∞, ∞):", options:["متزايدة", "متناقصة", "ثابتة", "متذبذبة"], correct:0, exp:"الميل 2 > 0 فالدالة متزايدة."},
  {id:366, section:"m11", q:"الدالة f(x) = -3x + 7:", options:["متزايدة", "متناقصة", "ثابتة", "غير معرفة"], correct:1, exp:"الميل -3 < 0 فالدالة متناقصة."},
  {id:367, section:"m11", q:"إذا كانت f'(x) > 0 على فترة، فإن f على تلك الفترة:", options:["متزايدة", "متناقصة", "ثابتة", "متذبذبة"], correct:0, exp:"المشتقة الموجبة تعني زيادة. المشتقة السالبة تعني تناقصاً."},
  {id:368, section:"m11", q:"نقطة انعطاف تحدث عندما:", options:["f'(x) = 0", "f''(x) = 0 مع تغير إشارتها", "f(x) = 0", "f'(x) = 1"], correct:1, exp:"نقطة الانعطاف هي نقطة يتغير فيها التقعر، حيث f''(x) = 0 وتغير إشارة."},
  {id:369, section:"m11", q:"الدالة f(x) = x² لها قيمة دنيا عند:", options:["x = 0", "x = 1", "x = -1", "x = ∞"], correct:0, exp:"الرأس عند x = 0، والدالة مقعرة لأعلى. القيمة الدنيا f(0) = 0."},
  {id:370, section:"m11", q:"إذا كانت f''(c) > 0 عند نقطة حرجة c:", options:["نهاية عظمى", "نهاية صغرى", "انعطاف", "لا شيء"], correct:1, exp:"f'(c)=0 و f''(c)>0 تعني تقعر لأعلى والنقطة نهاية صغرى محلية."},
  {id:371, section:"m11", q:"إذا كانت f''(c) < 0 عند نقطة حرجة:", options:["نهاية عظمى", "نهاية صغرى", "انعطاف", "ثابتة"], correct:0, exp:"f''(c)<0: تقعر لأسفل، والنقطة نهاية عظمى محلية."},
  {id:372, section:"m11", q:"الدالة f(x) = sin x لها خط تماثل:", options:["المحور x", "المحور y", "نقطة الأصل", "ليس لها"], correct:2, exp:"sin x دالة فردية، متماثلة حول نقطة الأصل."},
  {id:373, section:"m11", q:"الدالة f(x) = cos x متماثلة حول:", options:["نقطة الأصل", "المحور y", "المحور x", "لا شيء"], correct:1, exp:"cos x زوجية، متماثلة حول محور y."},
  {id:374, section:"m11", q:"التركيب (f ∘ g)(x) =", options:["f(x) · g(x)", "f(x) + g(x)", "f(g(x))", "g(f(x))"], correct:2, exp:"تركيب الدوال: (f∘g)(x) = f(g(x)). نطبق g أولاً ثم f."},
  {id:375, section:"m11", q:"إذا كانت f(x) = 2x و g(x) = x + 1، فإن (f∘g)(3) =", options:["7", "8", "6", "14"], correct:1, exp:"g(3) = 4، ثم f(4) = 8. أو مباشرة: f(g(x)) = 2(x+1) = 2x+2، ثم عند x=3: 8."},
  {id:376, section:"m11", q:"التحويل y = f(x + 2) يعني:", options:["إزاحة يساراً 2", "إزاحة يميناً 2", "إزاحة لأعلى 2", "إزاحة لأسفل 2"], correct:0, exp:"f(x+2): x تستبدل بـ x+2 (الفاصلة تنقص 2)، فالمنحنى يُزاح يساراً."},
  {id:377, section:"m11", q:"التحويل y = f(x) - 3:", options:["إزاحة يساراً 3", "إزاحة يميناً 3", "إزاحة لأعلى 3", "إزاحة لأسفل 3"], correct:3, exp:"الطرح من الدالة كلها = إزاحة رأسية لأسفل."},
  {id:378, section:"m11", q:"التحويل y = f(-x):", options:["انعكاس حول المحور x", "انعكاس حول المحور y", "إزاحة", "تمدد"], correct:1, exp:"f(-x) هو انعكاس المنحنى حول المحور y."},
  {id:379, section:"m11", q:"التحويل y = -f(x):", options:["انعكاس حول المحور x", "انعكاس حول المحور y", "تمدد", "تقلص"], correct:0, exp:"-f(x) هو انعكاس المنحنى حول المحور x."},
  {id:380, section:"m11", q:"الدالة f(x) = 2(x-1)² - 3 رأسها:", options:["(1, -3)", "(-1, -3)", "(1, 3)", "(2, -3)"], correct:0, exp:"الصيغة a(x-h)² + k رأسها (h, k) = (1, -3)."},
  {id:381, section:"m11", q:"أي التالي ليس زوجية ولا فردية؟", options:["f(x) = x²", "f(x) = x³", "f(x) = x² + x", "f(x) = |x|"], correct:2, exp:"f(x) = x² + x: f(-x) = x² - x ≠ f(x) و ≠ -f(x)."},
  {id:382, section:"m11", q:"الدالة الثابتة f(x) = k دالة:", options:["زوجية", "فردية", "ثابتة", "زوجية وفردية"], correct:0, exp:"f(-x) = k = f(x). الدوال الثابتة جميعها زوجية."},
  {id:383, section:"m11", q:"في منحنى y = x² - 4x + 3، قيمة المحور التماثلي:", options:["x = 0", "x = 2", "x = -2", "x = 1"], correct:1, exp:"محور التماثل عند x = -b/(2a) = 4/2 = 2."},
  {id:384, section:"m11", q:"مقطع y للدالة f(x) = 3x² - 6x + 8:", options:["3", "-6", "8", "2"], correct:2, exp:"المقطع الصادي = f(0) = 8."},
  {id:385, section:"m12", q:"قيمة log₁₀ 100 =", options:["1", "2", "10", "100"], correct:1, exp:"log₁₀ 100 = log₁₀ 10² = 2. تعريف log: log_a b = c ⟺ aᶜ = b."},
  {id:386, section:"m12", q:"قيمة log₂ 8 =", options:["2", "3", "4", "8"], correct:1, exp:"8 = 2³ فـ log₂ 8 = 3."},
  {id:387, section:"m12", q:"log_a 1 =", options:["0", "1", "a", "غير معرف"], correct:0, exp:"a⁰ = 1 لكل a > 0 فـ log_a 1 = 0."},
  {id:388, section:"m12", q:"log_a a =", options:["0", "1", "a", "a²"], correct:1, exp:"a¹ = a، فـ log_a a = 1."},
  {id:389, section:"m12", q:"حل log₃ x = 2:", options:["x = 6", "x = 9", "x = 3", "x = 1"], correct:1, exp:"log₃ x = 2 ⟺ x = 3² = 9."},
  {id:390, section:"m12", q:"log 50 + log 2 =", options:["log 52", "log 100", "log 25", "log 48"], correct:1, exp:"log a + log b = log(ab): log(50 × 2) = log 100 = 2."},
  {id:391, section:"m12", q:"log 1000 - log 100 =", options:["log 10", "log 900", "1", "3"], correct:2, exp:"log(1000/100) = log 10 = 1."},
  {id:392, section:"m12", q:"log₂ 16³ =", options:["4", "6", "12", "48"], correct:2, exp:"log_a bⁿ = n log_a b. = 3 × log₂ 16 = 3 × 4 = 12."},
  {id:393, section:"m12", q:"حل 2ˣ = 64:", options:["x = 4", "x = 5", "x = 6", "x = 32"], correct:2, exp:"64 = 2⁶. فـ x = 6."},
  {id:394, section:"m12", q:"ln e =", options:["0", "1", "e", "غير معرفة"], correct:1, exp:"ln = log بأساس e. فـ ln e = 1."},
  {id:395, section:"m12", q:"ln 1 =", options:["0", "1", "e", "-1"], correct:0, exp:"log لأي عدد من 1 = 0. ln 1 = 0."},
  {id:396, section:"m12", q:"مجال f(x) = log(x - 3):", options:["x > 3", "x ≥ 3", "x < 3", "ℝ"], correct:0, exp:"log معرف للموجب: x - 3 > 0 ⟹ x > 3."},
  {id:397, section:"m12", q:"الدالة العكسية لـ f(x) = eˣ:", options:["e⁻ˣ", "ln x", "1/eˣ", "log x"], correct:1, exp:"f⁻¹ للدالة الأسية eˣ هي اللوغاريتم الطبيعي ln x."},
  {id:398, section:"m12", q:"حل log₂(x - 1) = 3:", options:["x = 7", "x = 9", "x = 8", "x = 4"], correct:1, exp:"x - 1 = 2³ = 8 ⟹ x = 9."},
  {id:399, section:"m12", q:"قيمة 10^(log 5):", options:["5", "log 5", "50", "1"], correct:0, exp:"بالخاصية العكسية: a^(log_a x) = x. فـ 10^(log₁₀ 5) = 5."},
  {id:400, section:"m12", q:"أي غير معرف؟", options:["log 0", "log 1", "log 10", "log 100"], correct:0, exp:"log 0 غير معرف (لا يوجد أس يجعل 10 صفراً). log السالب أيضاً غير معرف."},
  {id:401, section:"m12", q:"إذا كان log 2 ≈ 0.301، فإن log 200 ≈", options:["2.301", "0.602", "1.301", "0.301"], correct:0, exp:"log 200 = log(2 × 100) = log 2 + 2 = 0.301 + 2 = 2.301."},
  {id:402, section:"m12", q:"قانون تغيير الأساس: log_a b =", options:["log a/log b", "log b/log a", "log a + log b", "log(a·b)"], correct:1, exp:"log_a b = log_c b / log_c a. مفيد لحساب اللوغاريتم بأساسات غير 10 و e."},
  {id:403, section:"m12", q:"log₂ 1/4 =", options:["2", "-2", "4", "-4"], correct:1, exp:"1/4 = 2⁻². فـ log₂(1/4) = -2."},
  {id:404, section:"m12", q:"الدالة f(x) = aˣ عند a > 1:", options:["متزايدة", "متناقصة", "ثابتة", "متذبذبة"], correct:0, exp:"إذا a > 1: متزايدة. إذا 0 < a < 1: متناقصة."},
  {id:405, section:"m12", q:"منحنى f(x) = 2ˣ يقطع محور y في:", options:["(0, 0)", "(0, 1)", "(0, 2)", "(1, 2)"], correct:1, exp:"f(0) = 2⁰ = 1. أي دالة أسية aˣ تقطع y في (0, 1)."},
  {id:406, section:"m12", q:"حل eˣ = 10:", options:["x = log 10", "x = ln 10", "x = 10/e", "x = e¹⁰"], correct:1, exp:"eˣ = 10 ⟺ x = ln 10."},
  {id:407, section:"m12", q:"النمو السكاني N(t) = N₀ eʳᵗ، المعامل r يمثل:", options:["الكمية الابتدائية", "معدل النمو النسبي", "الزمن", "الثابت الطبيعي"], correct:1, exp:"r هو معدل النمو النسبي (لكل وحدة زمن). r > 0 نمو، r < 0 اضمحلال."},
  {id:408, section:"m12", q:"اضمحلال إشعاعي: N = N₀ e⁻ᵏᵗ، عند t = t½ (نصف العمر):", options:["N = N₀", "N = N₀/2", "N = 0", "N = 2N₀"], correct:1, exp:"نصف العمر: الزمن الذي تصبح فيه الكمية = نصف الابتدائية. N = N₀/2."},
  {id:409, section:"m12", q:"حل 3^(x+2) = 81:", options:["x = 2", "x = 4", "x = 1", "x = 5"], correct:0, exp:"81 = 3⁴. x + 2 = 4 ⟹ x = 2."},
  {id:410, section:"m12", q:"حل log(x+1) - log x = 1:", options:["x = 1/9", "x = 9", "x = 1", "x = 10"], correct:0, exp:"log((x+1)/x) = 1 ⟹ (x+1)/x = 10 ⟹ x+1 = 10x ⟹ 9x = 1 ⟹ x = 1/9."},
  {id:411, section:"m12", q:"log₃ 9 + log₃ 27 =", options:["2", "3", "5", "36"], correct:2, exp:"= log₃(9·27) = log₃ 243 = log₃ 3⁵ = 5. (أو 2 + 3 = 5)."},
  {id:412, section:"m12", q:"إذا كان eˣ = 7 فإن x =", options:["log 7", "ln 7", "7/e", "e⁷"], correct:1, exp:"x = ln 7 (بتعريف اللوغاريتم الطبيعي)."},
  {id:413, section:"m12", q:"الدالة f(x) = log₁₀ x تقطع المحور x في:", options:["(0, 0)", "(1, 0)", "(10, 0)", "(0, 1)"], correct:1, exp:"log₁₀ x = 0 ⟺ x = 1. تقطع x في (1, 0)."},
  {id:414, section:"m12", q:"خاصية log(aᵇ):", options:["b + log a", "b · log a", "log(a) + log(b)", "a · log b"], correct:1, exp:"قاعدة الأس في اللوغاريتم: log(aᵇ) = b · log a."},
  {id:415, section:"m12", q:"المعادلة y = 2 · 3ˣ:", options:["نمو أسي", "اضمحلال أسي", "خطية", "لوغاريتمية"], correct:0, exp:"دالة أسية بأساس > 1 (هو 3)، فتمثل نمواً أسياً."},
  {id:416, section:"m12", q:"المعادلة y = 5 · (0.8)ˣ:", options:["نمو أسي", "اضمحلال أسي", "خطية", "لوغاريتمية"], correct:1, exp:"دالة أسية بأساس بين 0 و 1 (هو 0.8)، فتمثل اضمحلالاً."},
  {id:417, section:"m12", q:"مقارنة log₂ 3 و log₂ 5:", options:["متساويان", "log₂ 3 > log₂ 5", "log₂ 3 < log₂ 5", "لا يمكن"], correct:2, exp:"log₂ دالة متزايدة. 3 < 5 ⟹ log₂ 3 < log₂ 5."},
  {id:418, section:"m12", q:"إذا كان 100% من قيمة استثمار بعد سنة يعطي 1.05 × القيمة، فإن معدل الفائدة السنوي:", options:["1%", "5%", "50%", "105%"], correct:1, exp:"القيمة تضاعفت بعامل 1.05 = زيادة 5%."},
  {id:419, section:"m12", q:"نصف عمر مادة 10 سنوات، تبقى نسبة بعد 30 سنة:", options:["1/8", "1/16", "1/4", "1/2"], correct:0, exp:"بعد 30 سنة = 3 دورات من نصف العمر. النسبة المتبقية = (1/2)³ = 1/8."},
  {id:420, section:"m13", q:"معادلة الدائرة مركزها (0,0) ونصف قطرها 4:", options:["x² + y² = 4", "x² + y² = 16", "(x-4)² + y² = 0", "x² + y² = 8"], correct:1, exp:"(x-h)² + (y-k)² = r² مع (0,0) و r=4: x² + y² = 16."},
  {id:421, section:"m13", q:"دائرة (x-3)² + (y+2)² = 25 مركزها ونصف قطرها:", options:["(3, -2)، 5", "(-3, 2)، 5", "(3, -2)، 25", "(3, 2)، 5"], correct:0, exp:"h=3, k=-2, r²=25 فـ r=5. المركز (3, -2)."},
  {id:422, section:"m13", q:"القطع المكافئ y = x² رأسه:", options:["(0, 0)", "(1, 0)", "(0, 1)", "(1, 1)"], correct:0, exp:"الصيغة a(x-h)² + k بـ h=0, k=0 فالرأس (0, 0)."},
  {id:423, section:"m13", q:"محور التماثل للقطع المكافئ y = (x-2)² + 1:", options:["x = 1", "x = 2", "y = 1", "y = 2"], correct:1, exp:"محور التماثل الرأسي x = h = 2."},
  {id:424, section:"m13", q:"القطع المكافئ y = (x-3)² - 4 رأسه:", options:["(3, -4)", "(-3, -4)", "(3, 4)", "(-3, 4)"], correct:0, exp:"الرأس (h, k) = (3, -4)."},
  {id:425, section:"m13", q:"القطع المكافئ x² = 4py، البؤرة:", options:["(p, 0)", "(0, p)", "(-p, 0)", "(0, -p)"], correct:1, exp:"للقطع المكافئ x² = 4py (فتحة رأسية)، البؤرة (0, p) والدليل y = -p."},
  {id:426, section:"m13", q:"في القطع الناقص x²/25 + y²/9 = 1:", options:["a = 5، b = 3", "a = 25، b = 9", "a = 3، b = 5", "a = 5، b = 9"], correct:0, exp:"a² = 25 ⟹ a = 5 (أكبر). b² = 9 ⟹ b = 3. المحور الكبير أفقي."},
  {id:427, section:"m13", q:"في القطع الناقص x²/25 + y²/9 = 1، البعد البؤري c:", options:["3", "4", "5", "√34"], correct:1, exp:"c² = a² - b² = 25 - 9 = 16 ⟹ c = 4."},
  {id:428, section:"m13", q:"طول المحور الأكبر في x²/16 + y²/9 = 1:", options:["3", "4", "6", "8"], correct:3, exp:"a² = 16 ⟹ a = 4. طول المحور الأكبر = 2a = 8."},
  {id:429, section:"m13", q:"القطع الناقص x² + 4y² = 16 المحور الأكبر:", options:["أفقي", "رأسي", "مائل", "منعدم"], correct:0, exp:"القسمة على 16: x²/16 + y²/4 = 1. a²=16 > b²=4 والأكبر تحت x²، فالمحور أفقي."},
  {id:430, section:"m13", q:"في القطع الزائد x²/a² - y²/b² = 1، c² =", options:["a² + b²", "a² - b²", "a · b", "a + b"], correct:0, exp:"للقطع الزائد: c² = a² + b² (عكس القطع الناقص)."},
  {id:431, section:"m13", q:"القطع الزائد x²/9 - y²/16 = 1:", options:["a = 3, b = 4", "a = 4, b = 3", "a = 9, b = 16", "a = 3, c = 5"], correct:0, exp:"a² = 9 ⟹ a = 3 (المحور العرضي). b² = 16 ⟹ b = 4."},
  {id:432, section:"m13", q:"طول المحور العرضي في القطع الزائد x²/25 - y²/144 = 1:", options:["10", "24", "26", "169"], correct:0, exp:"a² = 25 ⟹ a = 5. طول المحور العرضي = 2a = 10."},
  {id:433, section:"m13", q:"البعد البؤري في قطع زائد x²/9 - y²/16 = 1:", options:["3", "4", "5", "25"], correct:2, exp:"c² = 9 + 16 = 25 ⟹ c = 5."},
  {id:434, section:"m13", q:"أي المعادلات التالية تمثل دائرة؟", options:["x² + y² = 1", "x² - y² = 1", "x² = 4y", "x²/4 + y² = 1"], correct:0, exp:"للدائرة شرط: معاملا x² و y² متساويان وبنفس الإشارة. فقط x² + y² = 1 يحقق."},
  {id:435, section:"m13", q:"أي المعادلات تمثل قطع مكافئ؟", options:["x² + y² = 4", "x² - y² = 4", "y = x²", "x² + 4y² = 4"], correct:2, exp:"القطع المكافئ: متغير بدرجة 2 والآخر بدرجة 1. y = x² يحققه."},
  {id:436, section:"m13", q:"أي يمثل قطع زائد؟", options:["x² + y² = 9", "x² - y² = 9", "x² + 4y² = 9", "y = x² + 9"], correct:1, exp:"القطع الزائد: معاملاهما لـ x² و y² مختلفا الإشارة. x² - y² = 9."},
  {id:437, section:"m13", q:"أي يمثل قطع ناقص؟", options:["x² + y² = 9", "x² - y² = 9", "x²/9 + y²/4 = 1", "y = x²"], correct:2, exp:"القطع الناقص: معاملاهما موجبان لكن مختلفان. x²/9 + y²/4 = 1."},
  {id:438, section:"m13", q:"دائرة (x-1)² + (y+3)² = 36 نصف قطرها:", options:["3", "6", "9", "36"], correct:1, exp:"r² = 36 ⟹ r = 6."},
  {id:439, section:"m13", q:"القطع المكافئ x² = 16y بؤرته:", options:["(0, 4)", "(0, -4)", "(4, 0)", "(16, 0)"], correct:0, exp:"4p = 16 ⟹ p = 4. البؤرة (0, p) = (0, 4). الفتحة لأعلى."},
  {id:440, section:"m13", q:"معادلة دائرة مركزها (2, -3) ونصف قطرها 5:", options:["(x-2)² + (y+3)² = 25", "(x+2)² + (y-3)² = 25", "(x-2)² + (y+3)² = 5", "(x-2)² + (y-3)² = 25"], correct:0, exp:"الصيغة القياسية مع h=2, k=-3, r=5: (x-2)² + (y+3)² = 25."},
  {id:441, section:"m13", q:"محيط دائرة مساحتها 16π:", options:["4π", "8π", "16π", "32π"], correct:1, exp:"πr² = 16π ⟹ r = 4. المحيط = 2πr = 8π."},
  {id:442, section:"m13", q:"مساحة دائرة محيطها 10π:", options:["25π", "100π", "10π", "5π"], correct:0, exp:"2πr = 10π ⟹ r = 5. المساحة = πr² = 25π."},
  {id:443, section:"m13", q:"أي النقاط تقع على الدائرة x² + y² = 25؟", options:["(3, 4)", "(3, 5)", "(5, 5)", "(6, 0)"], correct:0, exp:"نعوض (3, 4): 9 + 16 = 25 ✓."},
  {id:444, section:"m13", q:"القطع الناقص دائرة عندما:", options:["a > b", "a = b", "a < b", "c = 0"], correct:3, exp:"عندما c = 0 (أي a = b)، يصبح القطع الناقص دائرة."},
  {id:445, section:"m13", q:"الخط المستقيم مماس لقطع ناقص إذا:", options:["يقطعه في نقطتين", "يقطعه في نقطة واحدة", "لا يقطعه", "يمر بالمركز"], correct:1, exp:"المماس يلمس المنحنى في نقطة واحدة فقط."},
  {id:446, section:"m13", q:"خطوط التقارب للقطع الزائد x²/a² - y²/b² = 1:", options:["y = ±(b/a)x", "y = ±(a/b)x", "x = ±a", "y = ±c"], correct:0, exp:"خطوط التقارب للقطع الزائد المتمركز في الأصل: y = ±(b/a)x."},
  {id:447, section:"m13", q:"أصغر معادلة دائرية في الصيغة العامة:", options:["x² + y² = 0", "x² + y² + 1 = 0", "x² + y² = 1", "x² - y² = 0"], correct:2, exp:"x² + y² = 1 دائرة الوحدة. x² + y² = 0 نقطة واحدة فقط."},
  {id:448, section:"m13", q:"عند تكبير القطع المكافئ y = x² بالعامل 2 (أوسع):", options:["y = 2x²", "y = x²/2", "y = (2x)²", "y = x² + 2"], correct:1, exp:"y = x²/2 يجعل المنحنى أوسع (أقل ارتفاعاً لنفس x)."},
  {id:449, section:"m13", q:"القطع المكافئ فتحته للأسفل إذا:", options:["a > 0", "a < 0", "a = 0", "c > 0"], correct:1, exp:"في y = ax² + bx + c: الفتحة لأعلى إذا a>0، للأسفل إذا a<0."},
  {id:450, section:"m14", q:"المتجه في البعدين يُمثّل بـ:", options:["(x)", "(x, y)", "(x, y, z)", "عدد حقيقي"], correct:1, exp:"المتجه في ℝ² له مكوّنان (x, y)."},
  {id:451, section:"m14", q:"مقدار المتجه ⟨3, 4⟩:", options:["5", "7", "12", "25"], correct:0, exp:"|v| = √(3² + 4²) = √25 = 5."},
  {id:452, section:"m14", q:"مقدار ⟨-6, 8⟩:", options:["2", "10", "14", "64"], correct:1, exp:"|v| = √(36 + 64) = √100 = 10."},
  {id:453, section:"m14", q:"⟨2, 3⟩ + ⟨4, -1⟩ =", options:["⟨6, 2⟩", "⟨6, 4⟩", "⟨-2, 4⟩", "⟨8, -3⟩"], correct:0, exp:"نجمع المكونات المتناظرة: (2+4, 3+(-1)) = (6, 2)."},
  {id:454, section:"m14", q:"2 · ⟨3, -1⟩ =", options:["⟨5, 1⟩", "⟨6, -2⟩", "⟨6, 1⟩", "⟨3, -2⟩"], correct:1, exp:"ضرب قياسي: 2·(3, -1) = (6, -2)."},
  {id:455, section:"m14", q:"⟨5, 3⟩ - ⟨2, 1⟩ =", options:["⟨3, 2⟩", "⟨7, 4⟩", "⟨3, 4⟩", "⟨2, 1⟩"], correct:0, exp:"(5-2, 3-1) = (3, 2)."},
  {id:456, section:"m14", q:"المتجه الصفري هو:", options:["⟨0, 0⟩", "⟨1, 1⟩", "⟨1, 0⟩", "غير معرف"], correct:0, exp:"المتجه الصفري ⟨0, 0⟩ هو العنصر المحايد للجمع."},
  {id:457, section:"m14", q:"المتجه الوحدة في اتجاه ⟨3, 4⟩:", options:["⟨3/5, 4/5⟩", "⟨3, 4⟩", "⟨1, 1⟩", "⟨5, 5⟩"], correct:0, exp:"المتجه الوحدة = v/|v|. |v| = 5 فـ (3/5, 4/5)."},
  {id:458, section:"m14", q:"الضرب القياسي (النقطي) ⟨1, 2⟩ · ⟨3, -1⟩ =", options:["3", "1", "5", "-1"], correct:0, exp:"v·u = v₁u₁ + v₂u₂ = (1)(3) + (2)(-1) = 3 - 2 = 1. بالتحقق: 3 + (-2) = 1. فالإجابة 1."},
  {id:459, section:"m14", q:"المتجهان متعامدان إذا كان ضربهما القياسي:", options:["0", "1", "-1", "مقدارهما"], correct:0, exp:"شرط التعامد: u · v = 0. الضرب القياسي صفر ⟺ المتجهان متعامدان."},
  {id:460, section:"m14", q:"هل ⟨2, 1⟩ و ⟨-1, 2⟩ متعامدان؟", options:["نعم", "لا", "لا يمكن معرفة", "متوازيان"], correct:0, exp:"(2)(-1) + (1)(2) = -2 + 2 = 0. متعامدان."},
  {id:461, section:"m14", q:"المتجه i = ⟨1, 0⟩ واتجاهه:", options:["محور x الموجب", "محور y الموجب", "محور x السالب", "أصل"], correct:0, exp:"i المتجه الوحدة في اتجاه محور x الموجب. j = ⟨0, 1⟩ في اتجاه y الموجب."},
  {id:462, section:"m14", q:"⟨3, 4⟩ بصيغة i و j:", options:["3i + 4j", "4i + 3j", "3i - 4j", "12ij"], correct:0, exp:"⟨a, b⟩ = ai + bj. فـ ⟨3, 4⟩ = 3i + 4j."},
  {id:463, section:"m14", q:"المتجه بين النقطتين A(1, 2) و B(4, 6):", options:["⟨3, 4⟩", "⟨5, 8⟩", "⟨-3, -4⟩", "⟨4, 6⟩"], correct:0, exp:"AB = B - A = (4-1, 6-2) = (3, 4)."},
  {id:464, section:"m14", q:"طول المتجه بين (0, 0) و (3, 4):", options:["5", "7", "12", "25"], correct:0, exp:"|v| = √(9+16) = 5."},
  {id:465, section:"m14", q:"زاوية المتجه ⟨1, 1⟩ مع محور x:", options:["30°", "45°", "60°", "90°"], correct:1, exp:"tan θ = 1/1 = 1 ⟹ θ = 45°."},
  {id:466, section:"m14", q:"⟨a, b⟩ متوازي لـ ⟨c, d⟩ إذا:", options:["ac + bd = 0", "ad - bc = 0", "a + c = 0", "a = c"], correct:1, exp:"شرط التوازي: المكونات متناسبة (ad = bc أو ad - bc = 0)."},
  {id:467, section:"m14", q:"في ⟨-3, 4⟩، اتجاه المتجه في الربع:", options:["الأول", "الثاني", "الثالث", "الرابع"], correct:1, exp:"x < 0, y > 0: الربع الثاني."},
  {id:468, section:"m14", q:"|3v| إذا كان |v| = 5:", options:["5", "15", "8", "25"], correct:1, exp:"|kv| = |k| · |v| = 3 · 5 = 15."},
  {id:469, section:"m14", q:"المتجهات في ثلاثة أبعاد ⟨x, y, z⟩، مقدار ⟨1, 2, 2⟩:", options:["3", "5", "4", "√5"], correct:0, exp:"|v| = √(1 + 4 + 4) = √9 = 3."},
  {id:470, section:"m14", q:"زاوية θ بين متجهين u, v:", options:["cos θ = u·v/(|u||v|)", "cos θ = u·v", "tan θ = u/v", "sin θ = u × v"], correct:0, exp:"قانون الزاوية بين متجهين: cos θ = (u·v)/(|u||v|)."},
  {id:471, section:"m14", q:"المتجه ⟨0, 3⟩:", options:["على محور x", "على محور y", "في الربع الأول", "صفري"], correct:1, exp:"المكون الأفقي 0 والرأسي 3، فالمتجه رأسي على محور y."},
  {id:472, section:"m14", q:"في مثلث قوى، القوى المتوازنة مجموعها:", options:["متجه صفري", "موجب", "متجه وحدة", "سالب"], correct:0, exp:"القوى المتوازنة: مجموعها = 0 (متجه صفري). الجسم في حالة توازن."},
  {id:473, section:"m14", q:"إذا كان u = 3i + 4j فإن u · i =", options:["3", "4", "7", "12"], correct:0, exp:"u · i = (3)(1) + (4)(0) = 3. يعطي المكون x."},
  {id:474, section:"m14", q:"المتجه في الصيغة القطبية ⟨r cos θ, r sin θ⟩ يمثل:", options:["متجه طوله r بزاوية θ", "دائرة", "نقطة فقط", "ثابت"], correct:0, exp:"تعبير عن المتجه بطوله r وزاويته θ مع محور x."},
  {id:475, section:"m14", q:"إسقاط المتجه v على u = (v · u / |u|²) · u يسمى:", options:["إسقاطاً", "ضرباً", "جمعاً", "دوراناً"], correct:0, exp:"إسقاط v على u: مكون v في اتجاه u."},
  {id:476, section:"m15", q:"النقطة في الإحداثيات القطبية تكتب:", options:["(x, y)", "(r, θ)", "(r, x)", "(x, θ)"], correct:1, exp:"الإحداثيات القطبية (r, θ) حيث r البعد عن القطب و θ الزاوية من المحور القطبي."},
  {id:477, section:"m15", q:"تحويل (r, θ) إلى (x, y):", options:["x = r, y = θ", "x = r cos θ, y = r sin θ", "x = θ cos r", "x = r/θ"], correct:1, exp:"x = r cos θ، y = r sin θ."},
  {id:478, section:"m15", q:"النقطة القطبية (4, π/2) بالإحداثيات الديكارتية:", options:["(4, 0)", "(0, 4)", "(-4, 0)", "(0, -4)"], correct:1, exp:"x = 4 cos(π/2) = 0. y = 4 sin(π/2) = 4. النقطة (0, 4)."},
  {id:479, section:"m15", q:"النقطة (3, 0) بالإحداثيات القطبية = ؟ ديكارتية:", options:["(3, 0)", "(0, 3)", "(-3, 0)", "(0, -3)"], correct:0, exp:"r = 3, θ = 0 ⟹ x = 3(1) = 3, y = 3(0) = 0. ⟹ (3, 0)."},
  {id:480, section:"m15", q:"النقطة الديكارتية (0, 0) في القطبية:", options:["(0, 0)", "(0, θ) لأي θ", "(1, 0)", "(r, π)"], correct:1, exp:"نقطة الأصل (القطب) r = 0 مع أي زاوية."},
  {id:481, section:"m15", q:"النقطة (1, 1) ديكارتية، ما r؟", options:["1", "√2", "2", "1/√2"], correct:1, exp:"r = √(x² + y²) = √(1+1) = √2."},
  {id:482, section:"m15", q:"النقطة (1, 1) ديكارتية، ما θ؟", options:["0", "π/6", "π/4", "π/2"], correct:2, exp:"tan θ = y/x = 1 ⟹ θ = π/4 (في الربع الأول)."},
  {id:483, section:"m15", q:"المعادلة القطبية r = 5 تمثل:", options:["خطاً", "دائرة", "قطعاً مكافئاً", "نقطة"], correct:1, exp:"r ثابت يعني جميع النقاط على بعد 5 من القطب ⟹ دائرة مركزها القطب."},
  {id:484, section:"m15", q:"المعادلة θ = π/4 تمثل:", options:["نقطة", "دائرة", "خطاً مستقيماً", "قطعاً"], correct:2, exp:"θ ثابت يعني خطاً مستقيماً يمر بالقطب بزاوية π/4."},
  {id:485, section:"m15", q:"المعادلة r = 2 cos θ تمثل:", options:["دائرة", "خطاً", "حلزوناً", "ورقة"], correct:0, exp:"r = 2a cos θ تمثل دائرة مركزها (a, 0) ونصف قطرها a. هنا: مركز (1, 0) ونصف قطر 1."},
  {id:486, section:"m15", q:"المعادلة r = 2 sin θ تمثل:", options:["دائرة", "خطاً", "قطعاً", "ورقة"], correct:0, exp:"r = 2a sin θ تمثل دائرة مركزها (0, a) ونصف قطرها a."},
  {id:487, section:"m15", q:"النقطة القطبية (2, π) ديكارتياً:", options:["(2, 0)", "(-2, 0)", "(0, 2)", "(0, -2)"], correct:1, exp:"x = 2 cos π = -2. y = 2 sin π = 0. ⟹ (-2, 0)."},
  {id:488, section:"m15", q:"r² =", options:["x + y", "x² + y²", "xy", "(x+y)²"], correct:1, exp:"من r cos θ = x و r sin θ = y نجد r² = x² + y²."},
  {id:489, section:"m15", q:"النقطة القطبية (r, θ) مع r = 0:", options:["نقطة الأصل", "نقطة على دائرة", "نقطة على محور x", "غير معرفة"], correct:0, exp:"r = 0 يعني نقطة الأصل بغض النظر عن θ."},
  {id:490, section:"m15", q:"المعادلة القطبية r = θ تمثل:", options:["دائرة", "حلزوناً (أرخميدس)", "خطاً", "قطعاً"], correct:1, exp:"r = θ هي حلزون أرخميدس: نصف القطر يزداد خطياً مع الزاوية."},
  {id:491, section:"m15", q:"r cos θ = 5 تعادل في الديكارتية:", options:["x = 5", "y = 5", "x² + y² = 25", "xy = 5"], correct:0, exp:"r cos θ = x. فـ x = 5 (خط رأسي)."},
  {id:492, section:"m15", q:"r sin θ = 3 تعادل:", options:["x = 3", "y = 3", "x² + y² = 9", "y² = 3"], correct:1, exp:"r sin θ = y. فـ y = 3 (خط أفقي)."},
  {id:493, section:"m15", q:"القلب (Cardioid) معادلته القطبية:", options:["r = a + a cos θ", "r = a", "r = θ", "r = cos 2θ"], correct:0, exp:"القلب: r = a(1 + cos θ) أو r = a(1 + sin θ). شكله يشبه القلب."},
  {id:494, section:"m15", q:"الوردة r = cos 3θ عدد ورقاتها:", options:["3", "6", "1", "9"], correct:0, exp:"الوردة cos nθ أو sin nθ: إذا n فردي فعدد الورقات = n. إذا زوجي = 2n."},
  {id:495, section:"m15", q:"الوردة r = sin 2θ عدد ورقاتها:", options:["2", "4", "6", "8"], correct:1, exp:"n = 2 (زوجي) فعدد الورقات = 2n = 4."},
  {id:496, section:"m16", q:"lim(x→2) (x² + 1) =", options:["3", "5", "4", "1"], correct:1, exp:"الدوال كثيرة الحدود متصلة، فنعوّض: (2)² + 1 = 5."},
  {id:497, section:"m16", q:"lim(x→0) sin x / x =", options:["0", "1", "∞", "-1"], correct:1, exp:"نهاية شهيرة: lim(x→0) sin x/x = 1."},
  {id:498, section:"m16", q:"lim(x→∞) 1/x =", options:["0", "1", "∞", "-1"], correct:0, exp:"كلما كبر x قلّ 1/x وقرب من 0."},
  {id:499, section:"m16", q:"lim(x→3) (x²-9)/(x-3) =", options:["0", "6", "3", "غير معرفة"], correct:1, exp:"بالتحليل: (x-3)(x+3)/(x-3) = x+3. عند x=3 ⟹ 6."},
  {id:500, section:"m16", q:"lim(x→1) (x²-1)/(x-1) =", options:["0", "1", "2", "غير معرفة"], correct:2, exp:"بالتحليل: (x-1)(x+1)/(x-1) = x+1. عند x=1 ⟹ 2."},
  {id:501, section:"m16", q:"lim(x→0) (1 - cos x)/x² =", options:["0", "1/2", "1", "∞"], correct:1, exp:"نهاية مشهورة: lim (1-cos x)/x² = 1/2."},
  {id:502, section:"m16", q:"lim(x→∞) (2x+1)/(3x-5) =", options:["0", "2/3", "3/2", "∞"], correct:1, exp:"نقسم على x: (2 + 1/x)/(3 - 5/x) → 2/3."},
  {id:503, section:"m16", q:"lim(x→∞) (x² + 1)/(x + 2) =", options:["0", "1", "∞", "2"], correct:2, exp:"درجة البسط (2) > درجة المقام (1)، النهاية = ∞."},
  {id:504, section:"m16", q:"lim(x→∞) 1/x² =", options:["0", "1", "∞", "∞²"], correct:0, exp:"كلما كبر x، قلّ 1/x² باتجاه 0."},
  {id:505, section:"m16", q:"قاعدة لوبيتال تُستخدم عند:", options:["نهاية 0/0 أو ∞/∞", "0 · ∞ فقط", "x = 0", "عدم وجود مشتقة"], correct:0, exp:"لوبيتال: lim f/g من صورة 0/0 أو ∞/∞ = lim f'/g' إذا وُجدت."},
  {id:506, section:"m16", q:"بلوبيتال: lim(x→0) sin x/x =", options:["lim cos x/1 = 1", "0", "∞", "-1"], correct:0, exp:"نشتق البسط والمقام: lim(cos x/1) = cos 0/1 = 1."},
  {id:507, section:"m16", q:"lim(x→2⁻) f(x) يعني:", options:["النهاية من اليمين", "النهاية من اليسار", "نهاية عامة", "لا معنى"], correct:1, exp:"2⁻ يعني من الاتجاه الأقل (من اليسار). 2⁺ من اليمين."},
  {id:508, section:"m16", q:"دالة متصلة عند x = a إذا:", options:["f(a) معرفة", "lim(x→a) f(x) موجودة", "lim = f(a)", "جميع الثلاثة"], correct:3, exp:"الاتصال عند a: f(a) معرفة، النهاية موجودة، والنهاية = f(a)."},
  {id:509, section:"m16", q:"الدالة f(x) = 1/x متصلة عند:", options:["كل x", "كل x ≠ 0", "x = 0 فقط", "x > 0 فقط"], correct:1, exp:"1/x غير معرفة عند x = 0 لكنها متصلة في كل ما عدا ذلك."},
  {id:510, section:"m16", q:"lim(x→0⁺) 1/x =", options:["0", "∞", "-∞", "1"], correct:1, exp:"من اليمين (x موجب صغير): 1/x → +∞."},
  {id:511, section:"m16", q:"lim(x→0⁻) 1/x =", options:["0", "∞", "-∞", "1"], correct:2, exp:"من اليسار (x سالب صغير): 1/x → -∞."},
  {id:512, section:"m16", q:"إذا كانت lim من اليمين ≠ lim من اليسار، فالنهاية:", options:["موجودة", "غير موجودة", "صفر", "لا نهائية"], correct:1, exp:"شرط وجود النهاية: النهايتان من الطرفين متساويتان."},
  {id:513, section:"m16", q:"lim(x→4) √x =", options:["2", "4", "16", "0"], correct:0, exp:"√x دالة متصلة في مجالها. lim(x→4) √x = √4 = 2."},
  {id:514, section:"m16", q:"lim(x→0) eˣ =", options:["0", "1", "e", "∞"], correct:1, exp:"e⁰ = 1، والدالة الأسية متصلة."},
  {id:515, section:"m16", q:"lim(h→0) [f(x+h) - f(x)]/h يسمى:", options:["التكامل", "المشتقة", "النهاية", "متوسط"], correct:1, exp:"هذا التعريف الأساسي للمشتقة من المبادئ الأولى."},
  {id:516, section:"m16", q:"lim(x→∞) xⁿ/eˣ (n موجبة):", options:["0", "1", "∞", "n"], correct:0, exp:"الدالة الأسية تنمو أسرع من أي كثير حدود. النهاية = 0."},
  {id:517, section:"m16", q:"lim(x→0) x ln x =", options:["0", "-∞", "∞", "1"], correct:0, exp:"صورة 0 · ∞، بلوبيتال أو الخواص: lim(x→0) x ln x = 0."},
  {id:518, section:"m16", q:"نظرية القيم المتوسطة تتطلب:", options:["اتصال على فترة مغلقة", "تفاضل مطلق", "دالة زوجية", "ثبات الدالة"], correct:0, exp:"نظرية القيم المتوسطة تتطلب الاتصال على فترة مغلقة [a, b]."},
  {id:519, section:"m17", q:"مشتقة f(x) = x² هي:", options:["2x", "x", "2", "x²"], correct:0, exp:"قاعدة القوة: d(xⁿ)/dx = n · xⁿ⁻¹. هنا n=2 ⟹ 2x."},
  {id:520, section:"m17", q:"مشتقة الثابت f(x) = 7:", options:["7", "0", "1", "x"], correct:1, exp:"مشتقة أي ثابت = 0 (لا يتغير مع x)."},
  {id:521, section:"m17", q:"مشتقة f(x) = 5x + 3:", options:["5", "3", "5x", "8"], correct:0, exp:"مشتقة 5x = 5، مشتقة 3 = 0. الناتج 5."},
  {id:522, section:"m17", q:"d/dx(x³):", options:["3x", "3x²", "x²", "x³"], correct:1, exp:"بقاعدة القوة: 3x² (الأس ينزل والباقي ينقص 1)."},
  {id:523, section:"m17", q:"d/dx(√x):", options:["1/(2√x)", "√x", "2√x", "1/√x"], correct:0, exp:"√x = x^(1/2). المشتقة = (1/2)x^(-1/2) = 1/(2√x)."},
  {id:524, section:"m17", q:"d/dx(sin x):", options:["cos x", "-cos x", "sin x", "-sin x"], correct:0, exp:"مشتقة sin x = cos x. تذكر: مشتقة cos x = -sin x."},
  {id:525, section:"m17", q:"d/dx(cos x):", options:["sin x", "-sin x", "cos x", "tan x"], correct:1, exp:"مشتقة cos x = -sin x (الإشارة السالبة مهمة)."},
  {id:526, section:"m17", q:"d/dx(eˣ):", options:["eˣ", "xeˣ⁻¹", "1", "e"], correct:0, exp:"الدالة الأسية eˣ تساوي مشتقتها."},
  {id:527, section:"m17", q:"d/dx(ln x):", options:["1/x", "ln x", "eˣ", "x"], correct:0, exp:"مشتقة ln x = 1/x لـ x > 0."},
  {id:528, section:"m17", q:"قاعدة الضرب: (fg)' =", options:["f'g'", "f'g + fg'", "f + g", "fg"], correct:1, exp:"قاعدة ليبنتز: (fg)' = f'g + fg'."},
  {id:529, section:"m17", q:"قاعدة القسمة: (f/g)' =", options:["f'/g'", "(f'g - fg')/g²", "fg'", "(f+g)/g"], correct:1, exp:"قاعدة القسمة: (f/g)' = (f'g - fg')/g²."},
  {id:530, section:"m17", q:"d/dx[(2x+1)⁵] بقاعدة السلسلة:", options:["5(2x+1)⁴", "10(2x+1)⁴", "2(2x+1)⁵", "5(2x+1)⁴·2"], correct:1, exp:"السلسلة: 5(2x+1)⁴ × 2 = 10(2x+1)⁴."},
  {id:531, section:"m17", q:"مشتقة f(x) = x² + 4x - 3:", options:["2x + 4", "x + 4", "2x", "x² + 4"], correct:0, exp:"نشتق حداً حداً: 2x + 4 + 0."},
  {id:532, section:"m17", q:"عند النقطة الحرجة f':", options:["= 0 أو غير معرفة", "> 0", "< 0", "= 1"], correct:0, exp:"النقاط الحرجة: f'=0 أو غير موجودة. مرشحات للنهاية العظمى/الصغرى."},
  {id:533, section:"m17", q:"إذا كانت f'(c) > 0 فإن f عند c:", options:["متزايدة", "متناقصة", "ثابتة", "غير معرفة"], correct:0, exp:"المشتقة الموجبة تعني زيادة، السالبة تعني تناقصاً."},
  {id:534, section:"m17", q:"d/dx(tan x):", options:["sec²x", "-sec²x", "sec x", "csc²x"], correct:0, exp:"مشتقة tan x = sec²x."},
  {id:535, section:"m17", q:"∫ x² dx =", options:["x³", "x³/3 + C", "2x", "x²/2 + C"], correct:1, exp:"عكس قاعدة القوة: ∫xⁿdx = xⁿ⁺¹/(n+1) + C."},
  {id:536, section:"m17", q:"∫ 1 dx =", options:["0", "x + C", "1", "x"], correct:1, exp:"تكامل الثابت 1 = x + C."},
  {id:537, section:"m17", q:"∫ 2x dx =", options:["x²", "x² + C", "2", "2x²"], correct:1, exp:"∫2xdx = x² + C."},
  {id:538, section:"m17", q:"∫ eˣ dx =", options:["eˣ", "eˣ + C", "xeˣ", "1"], correct:1, exp:"التكامل والتفاضل للدالة الأسية متساويان."},
  {id:539, section:"m17", q:"∫ cos x dx =", options:["sin x + C", "-sin x + C", "cos x + C", "tan x + C"], correct:0, exp:"تكامل cos x = sin x + C."},
  {id:540, section:"m17", q:"∫ sin x dx =", options:["-cos x + C", "cos x + C", "sin x + C", "-sin x + C"], correct:0, exp:"تكامل sin x = -cos x + C."},
  {id:541, section:"m17", q:"∫ (1/x) dx =", options:["ln|x| + C", "1/x²", "x + C", "-1/x"], correct:0, exp:"∫(1/x)dx = ln|x| + C. القيمة المطلقة ضرورية."},
  {id:542, section:"m17", q:"∫₀¹ x dx =", options:["0", "1/2", "1", "2"], correct:1, exp:"x²/2 من 0 إلى 1 = 1/2 - 0 = 1/2."},
  {id:543, section:"m17", q:"∫₀² 2x dx =", options:["2", "4", "0", "8"], correct:1, exp:"x² من 0 إلى 2 = 4 - 0 = 4."},
  {id:544, section:"m17", q:"النظرية الأساسية للتكامل:", options:["∫f'(x)dx = f(x)", "∫f(x)dx = f(a) - f(b)", "∫_a^b f'(x)dx = f(b) - f(a)", "∫ = Σ"], correct:2, exp:"النظرية الأساسية: ∫_a^b f'(x)dx = f(b) - f(a). التكامل عكس التفاضل."},
  {id:545, section:"m17", q:"∫₁² (1/x) dx =", options:["ln 2", "ln 1", "1", "0"], correct:0, exp:"ln|x| من 1 إلى 2 = ln 2 - 0 = ln 2."},
  {id:546, section:"m17", q:"∫ (3x² + 2x) dx =", options:["x³ + x² + C", "3x³ + 2x² + C", "x³ + 2x + C", "6x + 2"], correct:0, exp:"∫3x² = x³، ∫2x = x². الناتج x³ + x² + C."},
  {id:547, section:"m17", q:"∫₀^π sin x dx =", options:["0", "1", "2", "-2"], correct:2, exp:"[-cos x] من 0 إلى π = -cos π + cos 0 = 1 + 1 = 2."},
  {id:548, section:"m17", q:"معادلة المماس لـ y = x² عند (1, 1):", options:["y = 2x - 1", "y = 2x + 1", "y = x - 1", "y = x"], correct:0, exp:"الميل = f'(1) = 2. y - 1 = 2(x - 1) ⟹ y = 2x - 1."},
  {id:549, section:"m17", q:"في اختبار المشتقة الأولى، إذا تغيرت إشارة f' من + إلى - عند c:", options:["c نهاية عظمى", "c نهاية صغرى", "c انعطاف", "لا شيء"], correct:0, exp:"من + إلى -: كانت متزايدة ثم متناقصة، فـ c نهاية عظمى محلية."},

function removeDuplicateQuestions(questions) { const seen = new Set(); return questions.filter(q => { const key = q.q.trim(); if (seen.has(key)) return false; seen.add(key); return true; }); }
function getQuestionsBySection(secId) { return removeDuplicateQuestions(ALL_MATH_QUESTIONS.filter(q => q.section === secId)); }

let state = { selectedSection: 'all', questions: [], currentIdx: 0, answers: {}, timerInterval: null, timeLimitSec: 120, warningAt: 30, timerActive: true, isRetest: false, wrongIds: [] };
function formatTime(sec) { const m = Math.floor(sec/60).toString().padStart(2,'0'); const s = (sec%60).toString().padStart(2,'0'); return `${m}:${s}`; }
function renderHome() {
  const grid = document.getElementById('sectionsGrid');
  const uniqueAll = removeDuplicateQuestions(ALL_MATH_QUESTIONS);
  document.getElementById('totalQCount').textContent = uniqueAll.length + ' سؤال';
  grid.innerHTML = MATH_SECTIONS.map(sec => {
    const count = getQuestionsBySection(sec.id).length;
    return `<div class="section-card" style="--primary:${sec.color}" onclick="selectSection('${sec.id}')"><span class="check-mark">✅</span><span class="icon">${sec.icon}</span><h3>${sec.name}</h3><span class="q-badge" style="background:${sec.color}">${count} سؤال</span></div>`;
  }).join('');
}
function selectSection(id) { state.selectedSection = id; document.querySelectorAll('.section-card, .full-exam-card').forEach(c=>c.classList.remove('selected')); if(id==='all') document.getElementById('fullExamCard').classList.add('selected'); else document.querySelector(`.section-card[onclick*="${id}"]`)?.classList.add('selected'); document.getElementById('startBtn').disabled = false; }
function startExam(retestWrong = false) {
  let pool = [];
  if (retestWrong) { pool = ALL_MATH_QUESTIONS.filter(q => state.wrongIds.includes(q.id)); state.isRetest = true; }
  else { pool = state.selectedSection === 'all' ? [...ALL_MATH_QUESTIONS] : getQuestionsBySection(state.selectedSection); state.isRetest = false; }
  pool = removeDuplicateQuestions(pool);
  if (pool.length===0) { alert('لا توجد أسئلة!'); return; }
  const shuffle = document.getElementById('shuffleCheck').checked;
  if (shuffle) pool = pool.sort(()=>Math.random()-0.5);
  const qCount = document.getElementById('qCountSelect').value;
  if (qCount !== 'all') pool = pool.slice(0, parseInt(qCount));
  state.questions = pool; state.currentIdx = 0; state.answers = {}; state.timerActive = document.getElementById('timerCheck').checked;
  document.getElementById('examTitleSpan').textContent = state.isRetest ? '🔁 مراجعة الأخطاء' : (state.selectedSection==='all'?'الاختبار الشامل': MATH_SECTIONS.find(s=>s.id===state.selectedSection)?.name);
  document.getElementById('homeFloatBtn').style.display = 'block'; switchScreen('examScreen'); renderQuestion(); startQuestionTimer();
}
function switchScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function goHome() { clearInterval(state.timerInterval); document.getElementById('homeFloatBtn').style.display = 'none'; switchScreen('homeScreen'); }
function startQuestionTimer() {
  clearInterval(state.timerInterval);
  if (!state.timerActive) { document.getElementById('questionTimer').textContent = '--:--'; return; }
  state.questionStartTime = Date.now();
  state.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - state.questionStartTime) / 1000);
    const remaining = Math.max(0, state.timeLimitSec - elapsed);
    const timerSpan = document.getElementById('questionTimer');
    timerSpan.textContent = formatTime(remaining);
    timerSpan.classList.toggle('warning', remaining <= state.warningAt);
    if (remaining <= 0) { clearInterval(state.timerInterval); if (state.currentIdx < state.questions.length-1) nextQuestion(); else showEndConfirm(); }
  }, 200);
}
function renderQuestion() {
  const q = state.questions[state.currentIdx]; const total = state.questions.length; const answered = Object.keys(state.answers).length;
  document.getElementById('progressText').textContent = `${state.currentIdx+1}/${total} (أجبت ${answered})`;
  const userAns = state.answers[q.id]; const letters = ['أ','ب','ج','د'];
  document.getElementById('questionPanel').innerHTML = `<div class="q-meta"><span>${MATH_SECTIONS.find(s=>s.id===q.section)?.icon} ${MATH_SECTIONS.find(s=>s.id===q.section)?.name}</span><span>⚡ سؤال ${state.currentIdx+1}</span></div><div class="q-text">${q.q}</div><ul class="options-list">${q.options.map((opt,i)=>`<li class="option-item ${userAns===i?'selected':''}" onclick="selectAnswer(${q.id},${i})"><span class="option-letter">${letters[i]}</span><span>${opt}</span></li>`).join('')}</ul>`;
  document.getElementById('prevBtn').disabled = state.currentIdx === 0;
  const isLast = state.currentIdx === total-1;
  document.getElementById('nextBtn').textContent = isLast ? '🏁 إنهاء' : 'التالي ◀';
  document.getElementById('nextBtn').onclick = isLast ? showEndConfirm : nextQuestion;
  startQuestionTimer();
}
function selectAnswer(qId, optIdx) { state.answers[qId] = optIdx; renderQuestion(); }
function nextQuestion() { if (state.currentIdx < state.questions.length-1) { state.currentIdx++; renderQuestion(); } }
function prevQuestion() { if (state.currentIdx > 0) { state.currentIdx--; renderQuestion(); } }
function showEndConfirm() { document.getElementById('modalMsg').textContent = state.questions.filter(q=> state.answers[q.id]===undefined).length ? 'لديك أسئلة غير مجابة. إنهاء؟' : 'جاهز لرؤية النتيجة؟'; document.getElementById('confirmModal').style.display = 'flex'; }
function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }
function forceEndExam() { closeModal(); finishExam(); }
function finishExam() {
  clearInterval(state.timerInterval); let correct=0, wrong=0, skip=0; const wrongIds = [];
  state.questions.forEach(q=>{ const ans = state.answers[q.id]; if (ans === undefined) skip++; else if (ans === q.correct) correct++; else { wrong++; wrongIds.push(q.id); } });
  state.wrongIds = wrongIds; const total = state.questions.length; const pct = Math.round((correct/total)*100);
  document.getElementById('finalScore').textContent = pct+'%';
  document.getElementById('gradeMsg').textContent = pct>=90?'🌟 ممتاز':pct>=75?'👏 جيد جداً':pct>=60?'👍 جيد':'📖 يحتاج مراجعة';
  document.getElementById('correctStat').textContent = correct; document.getElementById('wrongStat').textContent = wrong; document.getElementById('skipStat').textContent = skip;
  document.getElementById('retestWrongBtn').style.display = wrongIds.length>0 ? 'inline-flex':'none';
  buildReviewList(); switchScreen('resultsScreen');
}
function buildReviewList() {
  const container = document.getElementById('reviewList'); const letters = ['أ','ب','ج','د'];
  container.innerHTML = state.questions.map(q=>{
    const ua = state.answers[q.id]; const isSkip = ua===undefined; const isCorrect = !isSkip && ua===q.correct;
    return `<div class="review-item ${isSkip?'skip-card':(isCorrect?'correct-card':'wrong-card')}" data-status="${isSkip?'skip':(isCorrect?'correct':'wrong')}">
      <strong>${isSkip?'⏭ لم تجب':(isCorrect?'✅ صحيح':'❌ خطأ')}</strong> · ${MATH_SECTIONS.find(s=>s.id===q.section)?.name}<br>
      <div style="margin:10px 0; font-weight:600;">${q.q}</div>
      ${!isSkip && !isCorrect ? `<div style="margin:10px 0;">❌ إجابتك: ${letters[ua]}. ${q.options[ua]}</div>` : ''}
      <div style="background:#eaf7ea; padding:10px; border-radius:12px;">✅ الإجابة الصحيحة: ${letters[q.correct]}. ${q.options[q.correct]}</div>
      <div class="explain-box"><strong>💡 شرح:</strong> ${q.exp}</div>
    </div>`;
  }).join('');
}
function filterReview(type, btn) { document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.review-item').forEach(card=>{ card.style.display = (type==='all' || card.dataset.status===type) ? 'block':'none'; }); }
function startRetestWrong() { if (state.wrongIds.length===0) return; switchScreen('homeScreen'); setTimeout(()=> startExam(true), 50); }
function restartSameExam() { switchScreen('homeScreen'); setTimeout(()=> startExam(false), 50); }
document.addEventListener('DOMContentLoaded', ()=>{ renderHome(); selectSection('all'); });
</script>
